<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tango</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- LOGIN -->

<div id="authContainer">

    <h1>📈 TANGO</h1>

    <p class="subtitle">
        Market Intelligence Platform
    </p>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="registerBtn">
        Registrati
    </button>

    <button id="loginBtn">
        Login
    </button>

    <div id="message"></div>

</div>

<!-- APP -->

<div id="appContainer" style="display:none;">

    <div class="headerCard">

        <h1>📈 TANGO</h1>

        <p class="subtitle">
            Personal Market Dashboard
        </p>

    </div>

    <div class="card">

        <p id="welcomeText"></p>

    </div>

    <div class="card">

        <h3>🔍 Cerca un ticker</h3>

        <input
            type="text"
            id="tickerInput"
            placeholder="Es. AAPL"
        >

        <button id="addTickerBtn">
            Aggiungi alla Watchlist
        </button>

        <div id="statusMessage"></div>

    </div>

    <div class="card">

        <h3>⭐ La mia Watchlist</h3>

        <ul id="watchlist"></ul>

    </div>

    <button id="logoutBtn">
        Logout
    </button>

</div>

<script src="js/app.js"></script>

</body>
</html>
